spring.application.name=projeta.dev

spring.datasource.url=jdbc:postgresql://localhost:5432/projection_dev
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}


#Config flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true

projeta.dev.security.token.secret.user=${JWT_SECRET_USER}
# projeta.dev.security.token.secret.admin=${JWT_SECRET_ADMIN}
