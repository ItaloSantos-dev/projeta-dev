<div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/50 backdrop-blur-sm">
    <div class="w-full max-w-lg max-h-[90vh] flex flex-col overflow-hidden rounded-3xl shadow-2xl border border-gray-800 bg-[#0f172a]/95 backdrop-blur-2xl">
        
        <div class="p-8 pb-4 text-center border-b border-gray-800/50">
            <h2 class="text-2xl font-bold text-white mb-1">Adicionar Habilidade</h2>
            <p class="text-gray-400 text-sm">Personalize o título e o ícone da sua nova skill.</p>
        </div>

        <div [ngClass]="{'max-h-33':!hasIcon, 'max-h-screen':hasIcon}" class="flex-1 transition-[max-height]  duration-500 overflow-hidden p-8 space-y-6">
            <form class="space-y-6">
                <div class="flex items-end gap-5">
                    <div class="grow">
                        <label for="skillTitle" class="block text-sm font-medium text-gray-300 mb-2">Título</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                                <i class="bi bi-pencil"></i>
                            </span>
                            <input formControlName="title" type="text" id="skillTitle" placeholder="Ex: Angular"
                                class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                        </div>
                    </div>

                    <div class="flex flex-col items-center mb-1">
                        <label class="block text-xs font-medium text-gray-400 mb-2">Ícone?</label>
                        <input (click)="hasIcon = !hasIcon" type="checkbox" formControlName="hasIcon" [checked]="hasIcon"
                            class="w-6 h-6 bg-gray-800 border-gray-700 rounded text-blue-500 focus:ring-blue-500 cursor-pointer">
                    </div>
                </div>

                <div class="space-y-4 pt-4 border-t border-gray-800">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Pesquise o ícone</label>
                    <div class="flex gap-2">
                        <div class="relative grow">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="search" placeholder="Ex: bootstrap, code..." 
                                class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <button type="button" class="px-5 bg-gray-700 hover:bg-gray-600 text-white rounded-xl transition flex items-center">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>

                    <textarea class="h-40 w-full bg-gray-900 border border-gray-700 text-gray-300 rounded-xl p-4 focus:outline-none focus:ring-1 focus:ring-gray-600" 
                              placeholder="Resultado da busca...">
                    </textarea>
                </div>
            </form>
        </div>

        <div class="p-6 bg-gray-900/50 border-t border-gray-800 flex justify-between gap-4">
            <button (click)="closingForm()" class="flex-1 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2 border border-red-500/20">
                <i class="bi bi-x-octagon"></i> cancelar
            </button>
            
            <button  type="button" class="flex-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2">
                <i class="bi bi-save"></i> Salvar Habilidade
            </button>
        </div>

    </div>
</div>
