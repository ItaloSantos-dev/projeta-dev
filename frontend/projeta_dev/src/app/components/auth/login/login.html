<main class="  flex items-center justify-center px-6 py-12">
    <div class="max-w-md mt-15 p-10 rounded-3xl shadow-2xl border border-gray-800">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-white mb-2">Bem-vindo de volta!</h2>
            <p class="text-gray-400">Entre para continuar construindo projetos reais.</p>
        </div>

        <form [formGroup]="formLogin" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-300 mb-2">E-mail</label>
                <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                    <i class="bi bi-envelope"></i>
                </span>
                <input formControlName="email" type="email" id="email" name="email" required
                    class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
            </div>

            <div>
                <div class="flex justify-between mb-2">
                <label for="password" class="block text-sm font-medium text-gray-300">Senha</label>
            
                </div>
                <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                    <i class="bi bi-lock"></i>
                </span>
                <input formControlName="password" type="password" id="password" name="password" required
                    class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg transition transform hover:scale-[1.02] active:scale-95">
                Entrar na Plataforma
            </button>

    
        </form>

        <p class="text-center text-gray-400 ">
        Ainda não tem conta? 
            <a [routerLink]="['/register']" class="text-blue-400 font-semibold hover:underline">Cadastre-se</a>
        </p>
    </div>
</main>
