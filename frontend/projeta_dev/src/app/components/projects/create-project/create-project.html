<div class="flex flex-col lg:flex-row my-5 justify-center gap-5 font-sans">
    
    <div class="max-w-4xl w-full">

        <h2 class="text-white text-2xl font-bold mb-6 flex items-center gap-2">
            <span class="w-2 h-8 bg-blue-500 rounded-full"></span>
            Criar Novo Projeto
        </h2>

        <div class="bg-slate-900/50 backdrop-blur-md border border-slate-800 rounded-3xl p-6 md:p-8 shadow-xl">
            <form class="flex flex-col gap-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex flex-col gap-2">
                        <label for="title" class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">Título do Projeto</label>
                        <input type="text" id="title" placeholder="Ex: Sistema de Gestão" 
                            class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                    </div>

                    <div class="flex flex-col gap-2">
                        <label for="repositoryLink" class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">Link do Repositório</label>
                        <input type="url" id="repositoryLink" placeholder="Ex: https://github.com/usuario/repo" 
                            class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label for="imgUrl" class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">URL da Imagem de Capa</label>
                    <input type="url" id="imgUrl" placeholder="Ex: https://meusite.com/imagem.png" 
                        class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>

                <div class="flex flex-col gap-2">
                    <label for="description" class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">Descrição</label>
                    <textarea id="description" rows="4" placeholder="Descreva os objetivos e funcionalidades do seu projeto..." 
                        class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all resize-none"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="flex flex-col gap-2">
                        <label for="stack" class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">Stack de Tecnologias</label>
                        <input type="text" id="stack" placeholder="Ex: Angular, Spring Boot, PostgreSQL" 
                            class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                    </div>

                    <div class="flex flex-col gap-2">
                        <label for="inputType" class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">Tipo de Projeto</label>
                        <select id="inputType" 
                            class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all appearance-none cursor-pointer">
                            <option value="" disabled selected>Selecione um tipo</option>
                            <option value="WEB">Web</option>
                            <option value="MOBILE">Mobile</option>
                            <option value="DESKTOP">Desktop</option>
                            <option value="API">API / Backend</option>
                        </select>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label for="principalPosition" class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">Posição Principal</label>
                        <input type="text" id="principalPosition" placeholder="Ex: Fullstack Developer" 
                            class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                    </div>
                </div>

                <div class="flex items-center justify-end gap-4 mt-4 pt-6 border-t border-slate-800/50">
                    <button type="button" routerLink="/dashboard" class="text-sm font-bold text-slate-400 hover:text-white px-6 py-2.5 transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-3 px-8 rounded-xl transition-all shadow-lg shadow-blue-900/20 active:scale-95 flex items-center gap-2">
                        <i class="bi bi-check-lg text-lg"></i>
                        Salvar Projeto
                    </button>
                </div>

            </form>
        </div>
    </div>

    <div class="flex flex-col gap-4 bg-white/5 backdrop-blur-md p-5 shadow rounded-2xl right-50 fixed ">
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest px-2">Ações</p>
        <button [routerLink]="['/dashboard/1']" class="group flex items-center gap-4 bg-slate-900 border hover:text-white hover:border-slate-600 p-4 rounded-2xl transition-all shadow-xl shadow-blue-900/20">
            <span class="bg-slate-800 p-2 rounded-xl group-hover:bg-slate-700 transition-colors">
                <i class="bi bi-arrow-left text-blue-400"></i>
            </span>
            <span class="font-bold text-white text-sm">Voltar</span>
        </button>

        <button class="group flex items-center gap-4 bg-slate-900 border border-slate-800 text-slate-300 hover:text-white hover:border-slate-600 p-4 rounded-2xl transition-all">
            <span class="bg-slate-800 p-2 rounded-xl group-hover:bg-slate-700 transition-colors">
                <i class="bi bi-folder2-open text-blue-400"></i>
            </span>
            <span class="font-semibold text-sm">Meus projetos</span>
        </button>
    </div>
</div>
