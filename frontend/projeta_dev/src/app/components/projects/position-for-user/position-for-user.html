<div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/50 backdrop-blur-sm">
    <div  class="w-full max-w-[50vw] max-h-[90vh] flex flex-col  rounded-3xl shadow-2xl border border-gray-800 bg-[#0f172a]/95 backdrop-blur-2xl">
        
        <div class="p-8 pb-4 text-center border-b border-gray-800/50">
            <h2 class="text-2xl font-bold text-white mb-1">Atribuir posição para o novo participante, {{notification().usernameSender}}, do projeto: {{notification().projectTitle}} </h2>
        </div>

        <div class="flex-1 overflow-y-auto p-8">
            <ul class="space-y-3">
                
                @for (position of positionsOfProject(); track position.id) {
                    <li>
                        <label [for]="position.name" class="flex items-center p-4 border border-gray-800 rounded-2xl cursor-pointer transition-all duration-200 hover:bg-gray-800/40 has-checked:border-blue-500 has-checked:bg-blue-500/10 group">

                            <input (click)="positionSelected = position.id" [value]="position.name" name="op" [id]="position.name" type="radio" class="w-5 h-5 text-blue-500 bg-gray-900 border-gray-700 focus:ring-blue-600 focus:ring-offset-[#0f172a] accent-blue-500 cursor-pointer">
                            <div class="ml-4 flex flex-col">
                                <span class="text-gray-200 font-medium transition-colors group-has-checked:text-blue-400">{{position.name}}</span>
                            </div>
                        </label>
                    </li>
                }
            </ul>
        </div>

        <div class="p-6 bg-gray-900/50 border-t border-gray-800 flex justify-between gap-4">
            <button (click)="closingForm()"  class="flex-1 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2 border border-red-500/20">
                <i class="bi bi-x-octagon"></i> cancelar
            </button>
            
            <button (click)="ngOnSubmit()"  type="button" class="flex-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2">
                <i class="bi bi-save"></i> Aceitar participante
            </button>
        </div>

    </div>
</div>
