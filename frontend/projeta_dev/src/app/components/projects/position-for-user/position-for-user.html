<div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/50 backdrop-blur-sm">
    <div  class="w-full max-w-[50vw] max-h-[90vh] flex flex-col  rounded-3xl shadow-2xl border border-gray-800 bg-[#0f172a]/95 backdrop-blur-2xl">
        
        <div class="p-8 pb-4 text-center border-b border-gray-800/50">
            <h2 class="text-2xl font-bold text-white mb-1">Atribuir posição para novo participante do projeto: (nome)</h2>
            <p class="text-gray-400 text-sm">Personalize o título e o ícone da sua nova skill.</p>
        </div>

        <div class="flex-1 overflow-y-auto p-8">
            <ul class="space-y-3">
                
                <li>
                    <label for="op1" class="flex items-center p-4 border border-gray-800 rounded-2xl cursor-pointer transition-all duration-200 hover:bg-gray-800/40 has-checked:border-blue-500 has-checked:bg-blue-500/10 group">
                        <input name="op" id="op1" type="radio" class="w-5 h-5 text-blue-500 bg-gray-900 border-gray-700 focus:ring-blue-600 focus:ring-offset-[#0f172a] accent-blue-500 cursor-pointer">
                        <div class="ml-4 flex flex-col">
                            <span class="text-gray-200 font-medium transition-colors group-has-checked:text-blue-400">Desenvolvedor Front-end</span>
                            <span class="text-gray-500 text-sm mt-0.5">Foco na interface, UI/UX e interações.</span>
                        </div>
                    </label>
                </li>
                
                <li>
                    <label for="op2" class="flex items-center p-4 border border-gray-800 rounded-2xl cursor-pointer transition-all duration-200 hover:bg-gray-800/40 has-checked:border-blue-500 has-checked:bg-blue-500/10 group">
                        <input name="op" id="op2" type="radio" class="w-5 h-5 text-blue-500 bg-gray-900 border-gray-700 focus:ring-blue-600 focus:ring-offset-[#0f172a] accent-blue-500 cursor-pointer">
                        <div class="ml-4 flex flex-col">
                            <span class="text-gray-200 font-medium transition-colors group-has-checked:text-blue-400">Desenvolvedor Back-end</span>
                            <span class="text-gray-500 text-sm mt-0.5">Arquitetura, banco de dados e regras de negócio.</span>
                        </div>
                    </label>
                </li>

                <li>
                    <label for="op3" class="flex items-center p-4 border border-gray-800 rounded-2xl cursor-pointer transition-all duration-200 hover:bg-gray-800/40 has-checked:border-blue-500 has-checked:bg-blue-500/10 group">
                        <input name="op" id="op3" type="radio" class="w-5 h-5 text-blue-500 bg-gray-900 border-gray-700 focus:ring-blue-600 focus:ring-offset-[#0f172a] accent-blue-500 cursor-pointer">
                        <div class="ml-4 flex flex-col">
                            <span class="text-gray-200 font-medium transition-colors group-has-checked:text-blue-400">Product Manager</span>
                            <span class="text-gray-500 text-sm mt-0.5">Estratégia, roadmap e gestão do produto.</span>
                        </div>
                    </label>
                </li>

                <li>
                    <label for="op4" class="flex items-center p-4 border border-gray-800 rounded-2xl cursor-pointer transition-all duration-200 hover:bg-gray-800/40 has-checked:border-blue-500 has-checked:bg-blue-500/10 group">
                        <input name="op" id="op4" type="radio" class="w-5 h-5 text-blue-500 bg-gray-900 border-gray-700 focus:ring-blue-600 focus:ring-offset-[#0f172a] accent-blue-500 cursor-pointer">
                        <div class="ml-4 flex flex-col">
                            <span class="text-gray-200 font-medium transition-colors group-has-checked:text-blue-400">Designer UI/UX</span>
                            <span class="text-gray-500 text-sm mt-0.5">Prototipagem, pesquisa e visual design.</span>
                        </div>
                    </label>
                </li>

            </ul>
        </div>

        <div class="p-6 bg-gray-900/50 border-t border-gray-800 flex justify-between gap-4">
            <button (click)="closingForm()"  class="flex-1 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2 border border-red-500/20">
                <i class="bi bi-x-octagon"></i> cancelar
            </button>
            
            <button   type="button" class="flex-2 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2">
                <i class="bi bi-save"></i> Aceitar participante
            </button>
        </div>

    </div>
</div>
