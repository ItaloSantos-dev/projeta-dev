<div class="flex flex-col lg:flex-row my-10 justify-center gap-8 font-sans px-4">
    
    <div class="max-w-4xl w-full">
        <a [routerLink]="['/dashboard']" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors mb-6 group text-sm font-bold uppercase tracking-widest">
            <i class="bi bi-arrow-left transition-transform group-hover:-translate-x-1"></i>
            Voltar para a listagem
        </a>

        <article class="bg-slate-900/50 backdrop-blur-md border border-slate-800 rounded-[2.5rem] overflow-hidden shadow-2xl">
            
            <div class="p-8 md:p-12 border-b border-slate-800/50 bg-linear-to-b from-blue-500/5 to-transparent">
                <div class="flex flex-wrap items-center gap-3 mb-6">
                    <span class="px-4 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-[10px] font-black uppercase tracking-[0.2em]">
                        Título: XXXX
                    </span>
                </div>

                <h1 class="text-3xl md:text-5xl font-extrabold text-white leading-tight mb-8">
                    Título: XXXX
                </h1>

                <div class="flex flex-wrap items-center justify-between gap-6">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-linear-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                            <i class="bi bi-person-fill text-xl"></i>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Autor</p>
                            <p class="text-white font-bold">Autor: XXXX</p>
                        </div>
                        <div class="h-8  bg-slate-800 hidden md:block"></div>
                        <div class="hidden md:block">
                            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Publicado em</p>
                            <p class="text-slate-300 font-medium">Data XXXX</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-3 bg-slate-950/50 p-2 rounded-2xl border border-slate-800">
                        <div class="flex items-center gap-2 text-emerald-400 bg-emerald-400/10 px-4 py-2 rounded-xl text-sm font-bold border border-emerald-400/20">
                            <i class="bi bi-arrow-up-short text-xl"></i>
                            Like: 
                        </div>
                        <div class="flex items-center gap-2 text-rose-400 bg-rose-400/10 px-4 py-2 rounded-xl text-sm font-bold border border-rose-400/20">
                            <i class="bi bi-arrow-down-short text-xl"></i>
                            Deslike: 
                        </div>
                    </div>

        
                </div>
            </div>

            <div class="p-8 md:p-12">
                <div class="prose prose-invert prose-blue max-w-none">
                    <p class="text-slate-300 leading-relaxed text-lg whitespace-pre-wrap">
                        Body aqui
                    </p>
                </div>
            </div>
        </article>
    </div>


</div>
