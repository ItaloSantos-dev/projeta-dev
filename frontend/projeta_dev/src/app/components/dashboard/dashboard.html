<div class=" flex flex-col lg:flex-row my-10 justify-center gap-5 font-sans">
    
    <div class=" max-w-4xl ">

        <h2 class="text-white text-2xl font-bold mb-6 flex items-center gap-2">
            <span class="w-2 h-8 bg-blue-500 rounded-full"></span>
            Conteúdos em Alta
        </h2>

        <div class="grid gap-4">
            @for (content of mostPopularContents(); track content.id) {
                <div class="group relative bg-slate-900/50 backdrop-blur-md border border-slate-800 rounded-3xl p-6 transition-all duration-300 hover:border-blue-500/50 hover:bg-slate-800/50 hover:shadow-[0_0_30px_-10px_rgba(59,130,246,0.3)]">
                    
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                        <div class="flex-1 space-y-2">
                            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">Título do Projeto</span>
                            <h3 class="text-xl font-bold text-white group-hover:text-blue-400 transition-colors">
                                {{content.title}}
                            </h3>
                            
                            <div class="flex items-center gap-3 pt-2">
                                <div class="flex items-center gap-1.5 text-emerald-400 bg-emerald-400/10 px-3 py-1 rounded-lg text-xs font-bold border border-emerald-400/20">
                                    <i class="bi bi-arrow-up-short text-lg"></i>
                                    {{content.tabcoinsCredit}}
                                </div>
                                <div class="flex items-center gap-1.5 text-rose-400 bg-rose-400/10 px-3 py-1 rounded-lg text-xs font-bold border border-rose-400/20">
                                    <i class="bi bi-arrow-down-short text-lg"></i>
                                    {{content.tabcoinsDebit}}
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-row md:flex-col items-center md:items-end justify-between gap-4">
                            <div class="text-left md:text-right">
                                <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Publicado em</p>
                                <p class="text-slate-300 text-sm font-medium">{{content.publishedAt}}</p>
                            </div>
                            
                            <button type="button" class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-2.5 px-6 rounded-xl transition-all shadow-lg shadow-blue-900/20 active:scale-95">
                                Ver Detalhes
                            </button>
                        </div>
                    </div>
                </div>
            }
        </div>
    </div>

    <div class="flex flex-col gap-4 bg-white/5 backdrop-blur-md p-5 shadow rounded-2xl right-50 fixed ">
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest px-2">Ações</p>
        
        <button class="group flex items-center gap-4 bg-blue-600 hover:bg-blue-500 p-4 rounded-2xl transition-all shadow-xl shadow-blue-900/20">
            <span class="bg-white/20 p-2 rounded-xl text-white">
                <i class="bi bi-plus-lg"></i>
            </span>
            <span class="font-bold text-white text-sm">Criar novo projeto</span>
        </button>

        <button class="group flex items-center gap-4 bg-slate-900 border border-slate-800 text-slate-300 hover:text-white hover:border-slate-600 p-4 rounded-2xl transition-all">
            <span class="bg-slate-800 p-2 rounded-xl group-hover:bg-slate-700 transition-colors">
                <i class="bi bi-search text-blue-400"></i>
            </span>
            <span class="font-semibold text-sm">Buscar projeto</span>
        </button>

        <button class="group flex items-center gap-4 bg-slate-900 border border-slate-800 text-slate-300 hover:text-white hover:border-slate-600 p-4 rounded-2xl transition-all">
            <span class="bg-slate-800 p-2 rounded-xl group-hover:bg-slate-700 transition-colors">
                <i class="bi bi-folder2-open text-blue-400"></i>
            </span>
            <span class="font-semibold text-sm">Meus projetos</span>
        </button>
    </div>
</div>
